name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Windows + Linux are the primary supported platforms. macOS support
        # is intended but deferred (Apple ships bash 3.2 by default; would
        # need a Homebrew bash install step before tests can run).
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v7

      - name: Show bash version
        shell: bash
        run: bash --version

      - name: Run examples
        shell: bash
        run: bash plugins/crucible/crucible.sh examples/

      - name: Run self-tests
        shell: bash
        run: bash plugins/crucible/crucible.sh tests/

  shellcheck:
    runs-on: ubuntu-latest
    name: shellcheck
    steps:
      - uses: actions/checkout@v7
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck --exclude=SC2329,SC2317 plugins/crucible/crucible.sh examples/*.sh tests/*.sh
